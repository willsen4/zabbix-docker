version: '3.5'

services:
  zabbix-server:
    image: zabbix/zabbix-server-mysql:alpine-latest
    container_name: zabbix-server
    environment:
      DB_SERVER_HOST: mysql-app        # Nome do container MySQL
      MYSQL_DATABASE: zabbix_db        # Banco que você vai criar no MySQL
      MYSQL_USER: zabbix_user          # Usuário MySQL
      MYSQL_PASSWORD: sua_senha_segura      # Senha do usuário
    ports:
      - "10051:10051"
    networks:
      - zabbix_network
      - mysql_network
    restart: always

  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:alpine-latest
    container_name: zabbix-web
    environment:
      DB_SERVER_HOST: mysql-app
      MYSQL_DATABASE: zabbix_db
      MYSQL_USER: zabbix_user
      MYSQL_PASSWORD: sua_senha_segura
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: America/Sao_Paulo
    depends_on:
      - zabbix-server
    ports:
      - "8070:8070"
      - "8443:8443"
    networks:
      - zabbix_network
      - mysql_network
    restart: always

  zabbix-agent:
    image: zabbix/zabbix-agent:alpine-latest
    container_name: zabbix-agent
    environment:
      ZBX_SERVER_HOST: zabbix-server
    depends_on:
      - zabbix-server
    networks:
      - zabbix_network
    restart: always

networks:
  zabbix_network:
    driver: bridge
  mysql_network:
    external: true   # <-- Importante! usa a rede já existente
